<div class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Edit Custom Supply</h2>
      <button class="close-btn" (click)="cancel()">×</button>
    </div>
    
    <div class="modal-body">
      <div class="form-group">
        <label>NAME</label>
        <input type="text" [(ngModel)]="formData.name" class="form-control" placeholder="Supply name">
      </div>

      <div class="form-group">
        <label>CATEGORY</label>
        <select [(ngModel)]="formData.categoryId" class="form-control">
          <option value="" disabled selected>Select a category</option>
          <option *ngFor="let cat of uniqueCategories" [value]="cat">{{ cat }}</option>
        </select>
      </div>

      <div class="form-group">
        <label>SUPPLY</label>
        <select [(ngModel)]="formData.supplyId" class="form-control">
          <option value="" disabled selected>Select a supply</option>
          <ng-container *ngFor="let sup of supplyTemplates()">
            <option *ngIf="!formData.categoryId || sup.category === formData.categoryId" [value]="sup.id">
              {{ sup.name }}
            </option>
          </ng-container>
        </select>
      </div>

      <div class="form-row">
        <div class="form-group half-width">
          <label>MINIMUM CAPACITY</label>
          <input type="number" [(ngModel)]="formData.minimumStock" class="form-control" placeholder="100">
        </div>
        <div class="form-group half-width">
          <label>MAXIMUM CAPACITY</label>
          <input type="number" [(ngModel)]="formData.maximumStock" class="form-control" placeholder="1000">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group half-width">
          <label>UNIT PRICE</label>
          <input type="number" step="0.01" [(ngModel)]="formData.unitPriceAmount" class="form-control" placeholder="19.99">
        </div>
        <div class="form-group half-width">
          <label>CURRENCY</label>
          <select [(ngModel)]="formData.unitPriceCurrencyCode" class="form-control">
            <option value="PEN">PEN</option>
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group half-width">
          <label>SUPPLY CONTENT</label>
          <input type="number" [(ngModel)]="formData.supplyContent" class="form-control" placeholder="500">
        </div>
        <div class="form-group half-width">
          <label>UOM (UNIT OF MEASURE)</label>
          <select [(ngModel)]="formData.unitMeasurement" class="form-control">
            <option value="" disabled selected>Select unit</option>
            <option value="kg">Kilograms (kg)</option>
            <option value="L">Liters (L)</option>
            <option value="doz">Dozen (doz)</option>
            <option value="grams">Grams (g)</option>
            <option value="units">Units</option>
          </select>
        </div>
      </div>

      <div class="form-group checkbox-group">
        <label class="checkbox-container">
          <input type="checkbox" [checked]="isPerishable" disabled>
          <span class="checkmark"></span>
          <div class="checkbox-text">
            <strong>Item is Perishable</strong>
            <span>Requires cold storage and expiration tracking</span>
          </div>
        </label>
      </div>

      <div class="form-group">
        <label>DESCRIPTION</label>
        <textarea [(ngModel)]="formData.description" class="form-control" rows="3" placeholder="Add specific details about the supply sourcing or storage requirements..."></textarea>
      </div>
    </div>
    
    <div class="modal-footer">
      <button class="btn btn-cancel" (click)="cancel()">Cancel</button>
      <button class="btn btn-create" (click)="update()">Update Supply</button>
    </div>
  </div>
</div>
